name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "bike_data_set/src/**"
      - "bike_data_set/tests/**"
      - "bike_data_set/pyproject.toml"
  pull_request:
    branches: [ main ]
    paths:
      - "bike_data_set/src/**"
      - "bike_data_set/tests/**"
      - "bike_data_set/pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bike_data_set

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . [dev]

      - name: Run tests
        run: pytest -v
