name: CI

on:
  push:
    branches: [main]
    paths:
      - "bike_data_set/src/**"
      - "bike_data_set/tests/**"
      - "bike_data_set/pyproject.toml"

  pull_request:
    branches: [main]
    paths:
      - "bike_data_set/src/**"
      - "bike_data_set/tests/**"
      - "bike_data_set/pyproject.toml"

jobs:

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bike_data_set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"

      - name: Install Ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check .

  test:
    name: Tests (Pytest + Spark)
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: bike_data_set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: "pip"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[ci,dev]

      - name: Show Java version
        run: java -version

      - name: Run tests
        run: pytest -v tests/unit

  # build:
  #   name: Build Package
  #   runs-on: ubuntu-latest
  #   needs: test

  #   defaults:
  #     run:
  #       working-directory: bike_data_set

  #   steps:
  #     - uses: actions/checkout@v4
    
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.11.14"
    
  #     - name: Install build tools
  #       run: pip install build
    
  #     - name: Build wheel
  #       run: python -m build
    
  #     - name: Upload artifact
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: bike-data-wheel
  #         path: bike_data_set/dist/*

  deploy:
    name: Deploy Bundle
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: bike_data_project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI (new)
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Check CLI version
        run: databricks version

      - name: Deploy Asset Bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy
