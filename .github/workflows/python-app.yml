name: CI

on:
  push:
    branches: [ main ]
    paths:
    - "bike_data_set/src/**"
    - "bike_data_set/tests/**"
    - "bike_data_set/pyproject.toml"
  pull_request:
    branches: [ main ]
    paths:
      - "bike_data_set/src/**"
      - "bike_data_set/tests/**"
      - "bike_data_set/pyproject.toml"

jobs:

  # lint:
